<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(18, 18, 18, 0.97);
      color: #fff;
      border-radius: 14px;
      padding: 13px 16px;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(52, 211, 153, 0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(52,211,153,0.1);
      cursor: pointer;
      transition: background 0.15s;
    }
    .toast:hover { background: rgba(30, 30, 30, 0.98); }
    .icon-wrap {
      width: 36px; height: 36px;
      background: rgba(52, 211, 153, 0.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }
    .content { flex: 1; min-width: 0; }
    .title {
      font-size: 13px; font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }
    .accounts {
      font-size: 11px;
      color: #34d399;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .hint {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
    }
    .arrow {
      font-size: 14px;
      color: rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    .progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, #34d399, #10b981);
      border-radius: 0 0 0 14px;
      animation: shrink var(--duration, 5s) linear forwards;
    }
    @keyframes shrink { from { width: 100%; } to { width: 0%; } }

    /* Entry animation */
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(24px) scale(0.95); }
      to   { opacity: 1; transform: translateX(0)   scale(1); }
    }
    .toast { animation: toast-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    /* Icon bounce */
    @keyframes icon-bounce {
      0%,100% { transform: translateY(0) scale(1); }
      30%      { transform: translateY(-5px) scale(1.15); }
      60%      { transform: translateY(-2px) scale(1.05); }
    }
    .icon-wrap { animation: icon-bounce 0.7s ease 0.35s both; }

    /* Border glow pulse (only for non-discarded) */
    @keyframes glow-pulse {
      0%,100% { box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(52,211,153,0.1); }
      50%      { box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 8px 2px rgba(52,211,153,0.45); }
    }
    .toast.glow { animation: toast-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                              glow-pulse 1.4s ease 0.6s 3; }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="icon-wrap">☁️</div>
    <div class="content">
      <div class="title">Recording saved</div>
      <div class="accounts" id="accounts"></div>
      <div class="hint">Click to view details and links</div>
    </div>
    <div class="arrow">›</div>
  </div>
  <div class="progress" id="progress"></div>
  <script>
    const params = new URLSearchParams(location.search)
    const toastId = params.get('toastId') || ''
    const mode = params.get('mode') || 'autosave'
    const count = parseInt(params.get('count') || '1', 10)
    const names = (params.get('names') || '').split('|').filter(Boolean)
    const duration = parseInt(params.get('duration') || '5000', 10)

    document.getElementById('progress').style.setProperty('--duration', (duration / 1000) + 's')

    const accountsEl = document.getElementById('accounts')
    const toastEl = document.getElementById('toast')
    if (mode === 'discarded') {
      document.querySelector('.icon-wrap').textContent = '🗑️'
      document.querySelector('.title').textContent = 'Recording discarded'
      accountsEl.textContent = 'The recording was deleted'
      accountsEl.style.color = 'rgba(255,255,255,0.5)'
      toastEl.style.borderColor = 'rgba(239,68,68,0.35)'
    } else if (mode === 'ready') {
      document.querySelector('.icon-wrap').textContent = '🎬'
      document.querySelector('.title').textContent = 'Recording complete'
      accountsEl.textContent = 'Ready to save'
      accountsEl.style.color = '#60a5fa'
      toastEl.classList.add('glow')
    } else if (names.length > 0) {
      accountsEl.textContent = `Uploaded to: ${names.join(', ')}`
      toastEl.classList.add('glow')
    } else {
      accountsEl.textContent = `Uploaded to ${count} Drive account${count !== 1 ? 's' : ''}`
      toastEl.classList.add('glow')
    }

    document.getElementById('toast').addEventListener('click', () => {
      if (window.toastAPI) window.toastAPI.click(toastId)
    })
  </script>
</body>
</html>
