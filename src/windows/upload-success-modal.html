<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Success</title>
    <link rel="stylesheet" href="../css/upload-success-modal.css" />
  </head>
  <body>
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <div class="success-icon">✅</div>
          <h2 class="modal-title">Upload Complete!</h2>
          <p class="modal-subtitle" id="accountName"></p>
        </div>

        <div class="modal-info">
          <div class="info-item">
            <p class="info-label">File Name:</p>
            <p class="info-value" id="fileName"></p>
          </div>
          <div class="info-item" id="uploadLinkContainer" style="display: none">
            <p class="info-label">Upload Link:</p>
            <p class="info-value link-value" id="uploadLink"></p>
          </div>
        </div>

        <div class="modal-actions">
          <button id="openUploadLinkBtn" class="btn btn-primary" style="display: none">Open Link</button>
          <button id="closeUploadModalBtn" class="btn btn-secondary">Close</button>
        </div>
      </div>
    </div>
    <script src="../js/upload-success-modal.js"></script>
  </body>
</html>
