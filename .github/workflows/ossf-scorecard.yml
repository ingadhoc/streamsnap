# OSSF Scorecard — mide la postura de seguridad del repositorio público
# Resultados visibles en la pestaña "Security" > "Code scanning alerts"
# https://securityscorecards.dev
name: OSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 8 * * 1'  # lunes 8:30 UTC (distinto a los otros para no saturar)

# Permisos mínimos requeridos por la acción oficial
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # subir SARIF al Security tab
      id-token: write          # OIDC para publicar resultados públicamente
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # scorecard recomienda esto explícitamente

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # publish_results=true comparte el badge y los resultados en
          # https://securityscorecards.dev para repos públicos
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-sarif
          path: scorecard-results.sarif
          retention-days: 5

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
