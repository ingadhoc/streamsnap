name: Manual Linux Release

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch or commit to build from"
        required: false
        default: "main"
        type: string
      release_name:
        description: "Release title (optional)"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.ensure_tag.outputs.tag }}
      release_name: ${{ steps.naming.outputs.name }}
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate OAuth secrets and create .env
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_CLIENT_ID:-}" ] || [ -z "${GOOGLE_CLIENT_SECRET:-}" ]; then
            echo "Missing required OAuth secrets."
            echo "Expected repository secrets: GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET"
            exit 1
          fi

          {
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
          } > .env

          chmod 600 .env
          echo "Created .env for packaged build."

      - name: Generate release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          if [[ ! "${VERSION}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Invalid package.json version: ${VERSION}"
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"

          PATTERN="^v${MAJOR}\.${MINOR}\.([0-9]+)$"
          MAX_PATCH=""

          while IFS= read -r ref; do
            TAG_NAME="${ref#refs/tags/}"
            if [[ "${TAG_NAME}" =~ ${PATTERN} ]]; then
              CANDIDATE_PATCH="${BASH_REMATCH[1]}"
              if [[ -z "${MAX_PATCH}" || "${CANDIDATE_PATCH}" -gt "${MAX_PATCH}" ]]; then
                MAX_PATCH="${CANDIDATE_PATCH}"
              fi
            fi
          done < <(git ls-remote --tags --refs origin)

          NEXT_PATCH="${PATCH}"
          if [[ -n "${MAX_PATCH}" && "${MAX_PATCH}" -ge "${PATCH}" ]]; then
            NEXT_PATCH="$((MAX_PATCH + 1))"
          fi

          TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${TAG}"

      - name: Create next available tag on remote
        id: ensure_tag
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CANDIDATE_TAG="${TAG}"

          for attempt in $(seq 1 20); do
            if git ls-remote --exit-code --tags origin "refs/tags/${CANDIDATE_TAG}" >/dev/null 2>&1; then
              if [[ ! "${CANDIDATE_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                echo "Cannot auto-increment non-semver tag: ${CANDIDATE_TAG}"
                exit 1
              fi

              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
              CANDIDATE_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
              echo "Tag already exists, trying ${CANDIDATE_TAG}"
              continue
            fi

            git tag -a "${CANDIDATE_TAG}" -m "Release ${CANDIDATE_TAG}"
            if git push origin "refs/tags/${CANDIDATE_TAG}"; then
              echo "tag=${CANDIDATE_TAG}" >> "$GITHUB_OUTPUT"
              echo "Using final tag: ${CANDIDATE_TAG}"
              exit 0
            fi

            git tag -d "${CANDIDATE_TAG}" >/dev/null 2>&1 || true

            if [[ ! "${CANDIDATE_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Cannot auto-increment non-semver tag after push failure: ${CANDIDATE_TAG}"
              exit 1
            fi

            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            CANDIDATE_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "Push race detected, retrying with ${CANDIDATE_TAG}"
          done

          echo "Failed to allocate a unique release tag after 20 attempts."
          exit 1

      - name: Sync package version to release tag (Linux)
        env:
          TAG: ${{ steps.ensure_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          npm pkg set version="${VERSION}"
          echo "Building Linux artifacts with package version ${VERSION}"

      - name: Build Linux artifacts
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.blockmap
            dist/latest-linux.yml

      - name: Resolve release name
        id: naming
        env:
          RELEASE_NAME: ${{ inputs.release_name }}
          TAG: ${{ steps.ensure_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${RELEASE_NAME}" ]; then
            echo "name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=Release ${TAG}" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    needs: build-linux
    runs-on: windows-latest
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate OAuth secrets and create .env
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GOOGLE_CLIENT_ID) -or [string]::IsNullOrWhiteSpace($env:GOOGLE_CLIENT_SECRET)) {
            Write-Error "Missing required OAuth secrets. Expected repository secrets: GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET"
          }

          "GOOGLE_CLIENT_ID=$env:GOOGLE_CLIENT_ID" | Set-Content -Path .env
          "GOOGLE_CLIENT_SECRET=$env:GOOGLE_CLIENT_SECRET" | Add-Content -Path .env

          Write-Host "Created .env for packaged build."

      - name: Sync package version to release tag (Windows)
        env:
          TAG: ${{ needs.build-linux.outputs.release_tag }}
        shell: pwsh
        run: |
          $version = $env:TAG -replace '^v', ''
          npm pkg set version=$version
          Write-Host "Building Windows artifacts with package version $version"

      - name: Build Windows artifacts
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  publish-to-apt:
    needs: build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: linux-artifacts

      - name: Checkout APT repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.APT_REPOSITORY || 'adhoc-dev/devops-apt-repository' }}
          token: ${{ secrets.PAT_TOKEN }}
          path: apt-repo

      - name: Copy .deb to pool and push
        env:
          TAG: ${{ needs.build-linux.outputs.release_tag }}
        run: |
          set -euo pipefail

          DEB_FILE=$(ls linux-artifacts/*.deb | head -1)
          if [ -z "${DEB_FILE}" ]; then
            echo "No .deb file found in linux-artifacts/"
            exit 1
          fi

          cp -f "${DEB_FILE}" apt-repo/pool/

          cd apt-repo
          git config user.email "devops@adhoc.inc"
          git config user.name "DevOps Team"
          git add ./pool/
          git commit -m "streamsnap ${TAG} release"
          git push origin main

  create-release:
    needs:
      - build-linux
      - build-windows
      - publish-to-apt
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release-artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts/windows

      - name: Ensure release does not already exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build-linux.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          HTTP_STATUS="$(curl -sS -o /tmp/release_by_tag.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}")"

          if [ "${HTTP_STATUS}" = "200" ]; then
            echo "A release for tag ${TAG} already exists. Refusing to overwrite."
            exit 1
          fi

          if [ "${HTTP_STATUS}" != "404" ]; then
            echo "Unexpected GitHub API response (${HTTP_STATUS}) while checking release for ${TAG}."
            cat /tmp/release_by_tag.json
            exit 1
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-linux.outputs.release_tag }}
          name: ${{ needs.build-linux.outputs.release_name }}
          files: |
            release-artifacts/linux/*
            release-artifacts/windows/*
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
