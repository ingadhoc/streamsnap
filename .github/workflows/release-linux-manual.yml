name: Manual Linux Release

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch or commit to build from"
        required: false
        default: "main"
        type: string
      release_name:
        description: "Release title (optional)"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release-linux:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate OAuth secrets and create .env
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_CLIENT_ID:-}" ] || [ -z "${GOOGLE_CLIENT_SECRET:-}" ]; then
            echo "Missing required OAuth secrets."
            echo "Expected repository secrets: GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET"
            exit 1
          fi

          {
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
          } > .env

          chmod 600 .env
          echo "Created .env for packaged build."

      - name: Generate release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          if [[ ! "${VERSION}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Invalid package.json version: ${VERSION}"
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"

          PATTERN="^v${MAJOR}\\.${MINOR}\\.([0-9]+)$"
          MAX_PATCH=""

          while IFS= read -r ref; do
            TAG_NAME="${ref#refs/tags/}"
            if [[ "${TAG_NAME}" =~ ${PATTERN} ]]; then
              CANDIDATE_PATCH="${BASH_REMATCH[1]}"
              if [[ -z "${MAX_PATCH}" || "${CANDIDATE_PATCH}" -gt "${MAX_PATCH}" ]]; then
                MAX_PATCH="${CANDIDATE_PATCH}"
              fi
            fi
          done < <(git ls-remote --tags --refs origin)

          NEXT_PATCH="${PATCH}"
          if [[ -n "${MAX_PATCH}" && "${MAX_PATCH}" -ge "${PATCH}" ]]; then
            NEXT_PATCH="$((MAX_PATCH + 1))"
          fi

          TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${TAG}"

      - name: Build Linux artifacts
        run: npm run build:linux

      - name: Collect release artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.blockmap
            dist/latest-linux.yml
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "No Linux artifacts found in dist/."
            exit 1
          fi

          {
            echo "files<<EOF"
            printf "%s\n" "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create next available tag on remote
        id: ensure_tag
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CANDIDATE_TAG="${TAG}"

          for attempt in $(seq 1 20); do
            if git ls-remote --exit-code --tags origin "refs/tags/${CANDIDATE_TAG}" >/dev/null 2>&1; then
              if [[ ! "${CANDIDATE_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                echo "Cannot auto-increment non-semver tag: ${CANDIDATE_TAG}"
                exit 1
              fi

              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
              CANDIDATE_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
              echo "Tag already exists, trying ${CANDIDATE_TAG}"
              continue
            fi

            git tag -a "${CANDIDATE_TAG}" -m "Release ${CANDIDATE_TAG}"
            if git push origin "refs/tags/${CANDIDATE_TAG}"; then
              echo "tag=${CANDIDATE_TAG}" >> "$GITHUB_OUTPUT"
              echo "Using final tag: ${CANDIDATE_TAG}"
              exit 0
            fi

            git tag -d "${CANDIDATE_TAG}" >/dev/null 2>&1 || true

            if [[ ! "${CANDIDATE_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Cannot auto-increment non-semver tag after push failure: ${CANDIDATE_TAG}"
              exit 1
            fi

            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            CANDIDATE_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "Push race detected, retrying with ${CANDIDATE_TAG}"
          done

          echo "Failed to allocate a unique release tag after 20 attempts."
          exit 1

      - name: Ensure release does not already exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ensure_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          HTTP_STATUS="$(curl -sS -o /tmp/release_by_tag.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}")"

          if [ "${HTTP_STATUS}" = "200" ]; then
            echo "A release for tag ${TAG} already exists. Refusing to overwrite."
            exit 1
          fi

          if [ "${HTTP_STATUS}" != "404" ]; then
            echo "Unexpected GitHub API response (${HTTP_STATUS}) while checking release for ${TAG}."
            cat /tmp/release_by_tag.json
            exit 1
          fi

      - name: Resolve release name
        id: naming
        env:
          RELEASE_NAME: ${{ inputs.release_name }}
          TAG: ${{ steps.ensure_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${RELEASE_NAME}" ]; then
            echo "name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=Release ${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ensure_tag.outputs.tag }}
          name: ${{ steps.naming.outputs.name }}
          files: ${{ steps.artifacts.outputs.files }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
