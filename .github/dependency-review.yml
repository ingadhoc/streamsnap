name: Dependency Review
on: [pull_request]

permissions:
  contents: read
  pull-requests: write   # para comentar el resumen en el PR

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Falla si se introduce alguna dep con CVE moderado o mayor
          fail-on-severity: moderate
          # Posta el resumen como comentario en el PR (visible sin entrar al job)
          comment-summary-in-pr: always
